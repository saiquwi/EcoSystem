version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: ecosystem_db
    environment:
      POSTGRES_DB: ecosystem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecosystem_network

  redis:
    image: redis:7-alpine
    container_name: ecosystem_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecosystem_network

  server:
    build: ./server
    container_name: ecosystem_server
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ecosystem
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_SECRET: your-super-secret-key-change-this
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - ecosystem_network

volumes:
  postgres_data:
  redis_data:

networks:
  ecosystem_network:
    driver: bridge